        var query = decoded.find(function(s) { return s.startsWith('q='); });

          var base = l.pathname.replace(/\/?$/, '');
          window.history.replaceState(null, null,
            base + path.slice(2) + (query ? '?' + query.slice(2) : '') + l.hash
          );
        }
      }
    }(window.location));
  </script>
